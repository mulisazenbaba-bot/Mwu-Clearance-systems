[build]
builder = "nixpacks"
  [build.args]
  NIXPACKS_PKGS = "php82 php82-curl php82-mbstring php82-openssl php82-tokenizer php82-xml php82-zip php82-pdo php82-pdo_mysql php82-pdo_pgsql php82-pdo_sqlite php82-tokenizer php82-xml php82-zip php82-gd php82-bcmath"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/api/health"